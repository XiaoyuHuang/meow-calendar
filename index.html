<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meow Calendar 🐱</title>
<style>
  /* ───────────── Reset & Base ───────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --pink:      #ffb3c6;
    --pink-l:    #ffd6e0;
    --lavender:  #c9b8f5;
    --lavender-l:#e8e0ff;
    --mint:      #b5ead7;
    --mint-l:    #d9f5ec;
    --cream:     #fff9f0;
    --peach:     #ffc9a5;
    --yellow-l:  #fff5c2;
    --text:      #5a4570;
    --text-light:#9b8aab;
    --shadow:    rgba(180,140,200,0.25);
  }

  body {
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    background-color: #fdf0f8;
    background-image:
      radial-gradient(ellipse 70% 60% at 20% 25%, rgba(255,210,230,0.65) 0%, transparent 100%),
      radial-gradient(ellipse 60% 70% at 80% 75%, rgba(210,190,255,0.55) 0%, transparent 100%),
      radial-gradient(ellipse 50% 50% at 55% 15%, rgba(190,235,215,0.45) 0%, transparent 100%);
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    color: var(--text);
  }

  /* ───────────── Header ───────────── */
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, #e86fa0, #9b6fd4, #4ab8a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header .subtitle {
    font-size: 1rem;
    color: var(--text-light);
    margin-top: 0.3rem;
    font-weight: 600;
  }
  .deco-row {
    font-size: 1.4rem;
    margin-top: 0.5rem;
    letter-spacing: 0.3rem;
    animation: floatDeco 3s ease-in-out infinite;
  }
  @keyframes floatDeco {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* ───────────── Month Label ───────────── */
  .month-label {
    font-size: clamp(1.2rem, 3vw, 1.6rem);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1.2rem;
    background: white;
    padding: 0.5rem 2rem;
    border-radius: 50px;
    box-shadow: 0 4px 16px var(--shadow);
    letter-spacing: 0.05em;
  }

  /* ───────────── Calendar Grid ───────────── */
  .calendar-wrap {
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 32px var(--shadow);
    padding: 1.5rem;
    width: min(980px, 100%);
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  .day-header {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 0.3rem 0;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }

  .day-cell {
    min-height: 160px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-weight: 700;
    font-size: clamp(0.75rem, 2vw, 1rem);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    user-select: none;
    background: var(--lavender-l);
    color: var(--text);
    border: 2px solid transparent;
  }
  .day-cell:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 16px var(--shadow);
    border-color: var(--lavender);
    z-index: 1;
  }
  .day-cell:active { transform: scale(0.97); }

  .day-cell.past {
    background: #f5f3f7;
    color: #c5b8d0;
    opacity: 0.75;
  }
  .day-cell.past:hover {
    border-color: #ddd5e5;
  }

  .day-cell.today {
    background: linear-gradient(135deg, #ffb3c6, #c9b8f5);
    color: white;
    border-color: transparent;
    animation: todayGlow 2.5s ease-in-out infinite;
    box-shadow: 0 0 0 0 rgba(201,184,245,0.7);
  }
  @keyframes todayGlow {
    0%,100% { box-shadow: 0 0 8px 2px rgba(255,179,198,0.5), 0 0 20px 4px rgba(201,184,245,0.3); }
    50%      { box-shadow: 0 0 16px 6px rgba(255,179,198,0.7), 0 0 32px 10px rgba(201,184,245,0.5); }
  }

  .day-cell.weekend { background: #fff0f8; }
  .day-cell.weekend.past { background: #f7f0f5; }

  .day-cell .paw-hint {
    font-size: 0.55rem;
    margin-top: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .day-cell:hover .paw-hint { opacity: 1; }

  .empty-cell { background: transparent !important; cursor: default; }
  .empty-cell:hover { transform: none !important; box-shadow: none !important; border-color: transparent !important; }

  /* ───────────── Decorative paw prints ───────────── */
  .paw-decor {
    position: fixed;
    pointer-events: none;
    font-size: 1.5rem;
    opacity: 0.07;
    animation: drift 12s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes drift {
    0%,100% { transform: translateY(0) rotate(0deg); }
    33%  { transform: translateY(-15px) rotate(8deg); }
    66%  { transform: translateY(8px) rotate(-5deg); }
  }

  /* ───────────── Modal Backdrop ───────────── */
  /* ───────────── Window Overlay ───────────── */
  /* ─── In-cell window (opens inside the clicked day cell) ─── */

  /* Larger calendar needs overflow handling when a cell is open */
  .calendar-grid { position: relative; }

  /* Open state for a day cell */
  .day-cell.window-open {
    cursor: default;
    overflow: hidden;
    padding: 0;
    transform: none !important;
    border: 2.5px solid #f0b0d8 !important;
    box-shadow:
      0 0 0 4px rgba(255,200,230,0.35),
      0 8px 24px rgba(180,100,200,0.28) !important;
    border-radius: 16px;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    position: relative;
    background: #fff0f8 !important;
    animation: cellOpen 0.25s ease-out forwards;
  }
  @keyframes cellOpen {
    from { transform: scale(0.92); opacity: 0.6; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .day-cell.window-open:hover { transform: none !important; }

  /* Glass area: room + shutters stacked */
  /* Glass area: room + shutters stacked */
  .cell-glass {
    position: relative;
    flex: 1;
    overflow: hidden;
    border-radius: 13px;
  }
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  /* Cozy room interior */
  .cell-room {
    position: absolute; inset: 0;
    background: #fff4fd;
    background-image:
      radial-gradient(circle, #f8d0ee 1.2px, transparent 1.2px);
    background-size: 12px 12px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding: 3px 3px 4px;
    gap: 3px;
  }
  /* Furniture layer */
  .room-furn {
    position: absolute;
    line-height: 1;
    pointer-events: none;
  }
  }

  /* Cat stage scaled to fit cell */
  .cell-room .cat-stage {
    width: 100%;
    height: 72%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Quote inside cell */
  .cell-quote {
    font-size: 0.5rem;
    font-weight: 700;
    color: #5a3070;
    text-align: center;
    line-height: 1.35;
    background: rgba(255,220,240,0.9);
    border-radius: 5px;
    padding: 3px 5px;
    width: 100%;
    box-sizing: border-box;
    opacity: 0;
    animation: cellQuoteFade 0.4s ease 0.9s forwards;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  @keyframes cellQuoteFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Shutters overlaid on room */
  .cell-shutter {
    position: absolute; top: 0; height: 100%; width: 50%;
    background: linear-gradient(160deg, #f9c8e8 0%, #e8a0d4 100%);
    will-change: transform; backface-visibility: hidden; overflow: hidden;
  }
  .cell-shutter-left  { left: 0;  transform-origin: left center;  border-right: 1.5px solid #d480c0; }
  .cell-shutter-right { right: 0; transform-origin: right center; border-left:  1.5px solid #d480c0; }

  .shutter-slats {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: space-evenly; padding: 4px 0;
  }
  .shutter-slat {
    height: 2px; margin: 0 6px;
    background: rgba(255,255,255,0.45); border-radius: 1px;
  }
  .shutter-cross-h {
    position: absolute; top: 50%; left: 0; right: 0;
    height: 3px; background: #d480c0; transform: translateY(-50%);
  }
  .shutter-paw {
    position: absolute; bottom: 10px; left: 50%;
    transform: translateX(-50%); font-size: 1rem; opacity: 0.3;
  }

  .cell-shutter-left.open  { animation: openLeft  0.6s cubic-bezier(0.4,0,0.2,1) 0.1s both; }
  .cell-shutter-right.open { animation: openRight 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s both; }
  @keyframes openLeft  {
    from { transform: perspective(600px) rotateY(0deg);    }
    to   { transform: perspective(600px) rotateY(-115deg); }
  }
  @keyframes openRight {
    from { transform: perspective(600px) rotateY(0deg);   }
    to   { transform: perspective(600px) rotateY(115deg); }
  }

  /* ───────────── Cat Stage (shared) ───────────── */
  .cat-stage {
    display: flex; align-items: flex-end; justify-content: center;
    flex-shrink: 0;
  }
  .cat-stage img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .sound-wave {
    position: absolute;
    top: -10px; right: -10px;
    font-size: 1.2rem;
    animation: soundPop 0.6s ease-out forwards;
  }
  @keyframes soundPop {
    0% { opacity: 0; transform: scale(0) rotate(-10deg); }
    60% { opacity: 1; transform: scale(1.2) rotate(5deg); }
    100% { opacity: 0; transform: scale(1) translateY(-20px); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .calendar-wrap { padding: 1rem; }
    .day-cell { border-radius: 10px; font-size: 0.72rem; min-height: 90px; }
    .modal { padding: 1.5rem 1.2rem 1.2rem; }
    .cat-stage { width: 150px; height: 170px; }
  }
</style>
</head>
<body>

<!-- Decorative paw prints -->
<div class="paw-decor" style="top:5%;left:3%;animation-delay:0s">🐾</div>
<div class="paw-decor" style="top:15%;right:5%;animation-delay:2s">⭐</div>
<div class="paw-decor" style="top:60%;left:2%;animation-delay:4s">💫</div>
<div class="paw-decor" style="top:75%;right:3%;animation-delay:1s">🐾</div>
<div class="paw-decor" style="bottom:10%;left:6%;animation-delay:3s">💕</div>

<div class="header">
  <h1>Meow Calendar</h1>
  <p class="subtitle">Click any day for a surprise!</p>
  <div class="deco-row">🐱 ✨ 🐾 ✨ 🐱</div>
</div>

<div class="month-label" id="monthLabel"></div>

<div class="calendar-wrap">
  <div class="day-headers">
    <div class="day-header">Sun</div>
    <div class="day-header">Mon</div>
    <div class="day-header">Tue</div>
    <div class="day-header">Wed</div>
    <div class="day-header">Thu</div>
    <div class="day-header">Fri</div>
    <div class="day-header">Sat</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</div>


<script>
// ─────────────────────────────────────────
//  QUOTES (30 quotes, no consecutive repeat)
// ─────────────────────────────────────────
const QUOTES = [
  "Every day is a fresh start, even for cats.",
  "You are purrfectly capable of amazing things.",
  "Land on your feet — you always do.",
  "Curiosity leads to the best adventures.",
  "Stretch, breathe, and take on the day.",
  "You have nine lives worth of potential.",
  "Be as fearless as a cat on a rooftop.",
  "Today holds something wonderful for you.",
  "Nap when you need to. Then conquer.",
  "Trust your instincts — they purr with wisdom.",
  "Even the smallest paw leaves a big mark.",
  "You are loved more than you know.",
  "Chase what makes your heart leap.",
  "Rest is part of the journey, not a detour.",
  "Great things happen one soft step at a time.",
  "You are exactly where you need to be.",
  "Land gracefully — you always find your footing.",
  "The sun is out and so is your potential.",
  "Be bold. Be curious. Be magnificently you.",
  "Every purr starts with a single breath.",
  "You deserve all the warmth today brings.",
  "Small joys add up to a beautiful life.",
  "Leap — the landing always works itself out.",
  "Your presence makes the world cozier.",
  "Today is a good day to be wonderfully alive.",
  "Shine like sunlight on a warm windowsill.",
  "You are braver than any cat on the internet.",
  "Make today as cozy as a cat nap in the sun.",
  "The best is always just around the corner.",
  "You are one-of-a-kind and absolutely enough."
];

let lastQuoteIdx = -1;
function pickQuote() {
  let idx;
  do { idx = Math.floor(Math.random() * QUOTES.length); }
  while (idx === lastQuoteIdx);
  lastQuoteIdx = idx;
  return QUOTES[idx];
}

// ─────────────────────────────────────────
//  CAT MEOW SOUNDS — 30 real recordings (CC0)
// ─────────────────────────────────────────
const meowSounds = [
  "sounds/meow_01.mp3","sounds/meow_02.mp3","sounds/meow_03.mp3",
  "sounds/meow_04.mp3","sounds/meow_05.mp3","sounds/meow_06.mp3",
  "sounds/meow_07.mp3","sounds/meow_08.mp3","sounds/meow_09.mp3",
  "sounds/meow_10.mp3","sounds/meow_11.mp3","sounds/meow_12.mp3",
  "sounds/meow_13.mp3","sounds/meow_14.mp3","sounds/meow_15.mp3",
  "sounds/meow_16.wav","sounds/meow_17.wav","sounds/meow_18.wav",
  "sounds/meow_19.wav","sounds/meow_20.ogg","sounds/meow_21.mp3",
  "sounds/meow_22.mp3","sounds/meow_23.mp3","sounds/meow_24.mp3",
  "sounds/meow_25.mp3","sounds/meow_26.mp3","sounds/meow_27.mp3",
  "sounds/meow_28.mp3","sounds/meow_29.mp3","sounds/meow_30.mp3",
];

let lastSoundIdx = -1;
function playRandomMeow() {
  let idx;
  do { idx = Math.floor(Math.random() * meowSounds.length); }
  while (idx === lastSoundIdx);
  lastSoundIdx = idx;
  const audio = new Audio(meowSounds[idx]);
  audio.play().catch(() => {});
}

// ─────────────────────────────────────────
//  CAT IMAGES — 30 watercolor AI illustrations
// ─────────────────────────────────────────
const catImages = Array.from({length: 30}, (_, i) =>
  `cats/cat_${String(i + 1).padStart(2, '0')}.jpg`
);

let lastCatIdx = -1;
function pickCat() {
  let idx;
  do { idx = Math.floor(Math.random() * catImages.length); }
  while (idx === lastCatIdx);
  lastCatIdx = idx;
  return `<img src="${catImages[idx]}" alt="Cute watercolor cat" style="max-width:100%;max-height:100%;object-fit:contain;">`;
}

// ─────────────────────────────────────────
//  CALENDAR BUILDER
// ─────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

const today = new Date();
const todayY = today.getFullYear();
const todayM = today.getMonth();
const todayD = today.getDate();

function buildCalendar() {
  document.getElementById('monthLabel').textContent =
    `${MONTHS[todayM]} ${todayY}`;

  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';

  const firstDay = new Date(todayY, todayM, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(todayY, todayM + 1, 0).getDate();

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day-cell empty-cell';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const isToday = (d === todayD);
    const isPast  = (d < todayD);
    const dow = (firstDay + d - 1) % 7; // 0=Sun,6=Sat
    const isWeekend = (dow === 0 || dow === 6);

    let cls = 'day-cell';
    if (isToday)  cls += ' today';
    else if (isPast) cls += ' past';
    if (isWeekend && !isToday) cls += ' weekend';

    cell.className = cls;
    cell.innerHTML = `${d}<span class="paw-hint">🐾</span>`;
    cell.dataset.day = d;

    grid.appendChild(cell);
  }
}

// ─────────────────────────────────────────
// ─────────────────────────────────────────
//  IN-CELL WINDOW LOGIC
// ─────────────────────────────────────────
let openCell = null;
let openCellOrigHTML = '';
let openCellDay = null;

// Furniture pool — 2 random picks per open
const FURNITURE = [
  { e: '🪴', s: 'bottom:30px;left:2px;font-size:0.75rem' },
  { e: '📚', s: 'top:3px;left:2px;font-size:0.65rem' },
  { e: '🧸', s: 'top:3px;right:2px;font-size:0.65rem' },
  { e: '⭐', s: 'top:2px;left:50%;transform:translateX(-50%);font-size:0.6rem' },
  { e: '🌙', s: 'top:3px;right:2px;font-size:0.65rem' },
  { e: '🎀', s: 'top:3px;left:2px;font-size:0.65rem' },
  { e: '🌸', s: 'bottom:30px;right:2px;font-size:0.72rem' },
  { e: '🍵', s: 'bottom:30px;left:2px;font-size:0.68rem' },
  { e: '🌟', s: 'top:2px;left:50%;transform:translateX(-50%);font-size:0.58rem' },
  { e: '🕯️', s: 'bottom:30px;right:2px;font-size:0.65rem' },
];
function pickFurniture() {
  const pool = [...FURNITURE].sort(() => Math.random() - 0.5).slice(0, 2);
  return pool.map(f =>
    `<span class="room-furn" style="${f.s}">${f.e}</span>`
  ).join('');
}

function openModal(day) {
  if (openCell) closeModal();

  const cell = document.querySelector(`.day-cell[data-day="${day}"]`);
  if (!cell) return;

  openCell = cell;
  openCellOrigHTML = cell.innerHTML;
  openCellDay = day;

  const catHTML  = pickCat();
  const quote    = pickQuote();
  const furnHTML = pickFurniture();

  cell.classList.add('window-open');
  cell.innerHTML = `
    <div class="cell-glass">
      <div class="cell-room">
        ${furnHTML}
        <div class="cat-stage">${catHTML}</div>
        <div class="cell-quote">${quote}</div>
      </div>
      <div class="cell-shutter cell-shutter-left">
        <div class="shutter-cross-h"></div>
        <div class="shutter-slats">
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div>
        </div>
        <div class="shutter-paw">🐾</div>
      </div>
      <div class="cell-shutter cell-shutter-right">
        <div class="shutter-cross-h"></div>
        <div class="shutter-slats">
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div><div class="shutter-slat"></div>
          <div class="shutter-slat"></div>
        </div>
        <div class="shutter-paw">🐾</div>
      </div>
    </div>
  `;

  const sl = cell.querySelector('.cell-shutter-left');
  const sr = cell.querySelector('.cell-shutter-right');
  void sl.offsetWidth;
  sl.classList.add('open');
  sr.classList.add('open');

  playRandomMeow();
}

function closeModal() {
  if (!openCell) return;
  const cell = openCell;
  openCell = null;
  openCellDay = null;
  cell.classList.remove('window-open');
  cell.innerHTML = openCellOrigHTML;
}

// Close on outside click (not inside calendar grid)
document.addEventListener("click", (e) => {
  const grid = document.getElementById("calendarGrid");
  if (openCell && !grid.contains(e.target)) closeModal();
});


// Close on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && openCell) closeModal();
});

buildCalendar();

// Event delegation — one listener handles all day cell clicks
document.getElementById("calendarGrid").addEventListener("click", (e) => {
  const cell = e.target.closest(".day-cell:not(.empty-cell)");
  if (!cell || !cell.dataset.day) return;
  if (cell.classList.contains("window-open")) return;  // already open
  openModal(parseInt(cell.dataset.day));
});
</script>
</body>
</html>
